# Single Server Deployment
# All components running on one machine

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: cascadia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cascadia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cascadia}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cascadia-internal

  # Cascadia Application (Core + Vault + Jobs embedded)
  app:
    build:
      context: ../../../..
      dockerfile: docker/app.Dockerfile
      target: production
    container_name: cascadia-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cascadia}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      BASE_URL: ${BASE_URL:-http://localhost:3000}

      # Vault embedded mode
      VAULT_MODE: embedded
      VAULT_TYPE: local
      FILE_STORAGE_PATH: /app/storage/files
      VAULT_ROOT: /app/vault

      # Jobs embedded mode
      JOBS_MODE: embedded
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      - app_storage:/app/storage
      - app_vault:/app/vault
    networks:
      - cascadia-internal
    # Run migrations on startup
    command: sh -c "npx drizzle-kit push --force && npm run serve"

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cascadia-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cascadia.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - cascadia-internal

volumes:
  postgres_data:
    driver: local
  app_storage:
    driver: local
  app_vault:
    driver: local
  pgadmin_data:
    driver: local

networks:
  cascadia-internal:
    driver: bridge
