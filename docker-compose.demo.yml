# Cascadia PLM — Quickstart demo (no clone, no build)
#
# Usage (no repo clone required):
#
#   curl -O https://raw.githubusercontent.com/Cascadia-PLM/Cascadia-App/main/docker-compose.demo.yml
#   docker compose -f docker-compose.demo.yml up -d
#
# Then open http://localhost:3000 and log in with:
#   admin@cascadia.local / Cascadia
#
# First run pulls ~1.2 GB of pre-built images from ghcr.io (2-5 min on a typical
# connection) and seeds the database. Subsequent boots are no-ops — the demo
# seed exits early when it sees the ROBOT-ARM program already exists.
#
# Reset everything (wipes only this stack's volumes):
#
#   docker compose -f docker-compose.demo.yml down -v
#
# Pin to a specific image version (recommended for stable demos):
#   replace `:latest` below with `:sha-<short>` from the GitHub Actions
#   "publish-demo-images" workflow run output.
#
# Notes:
#   * BETTER_AUTH_SECRET below is a hardcoded literal scoped to localhost.
#     DO NOT reuse this compose file for any deployment past your laptop —
#     rotate the secret first.
#   * All volumes are namespaced cascadia_demo_* and the project is named
#     cascadia-demo, so this stack does not conflict with the contributor
#     compose (docker-compose.demo-with-build.yml) or the dev stack.
#   * Working from a clone? Use docker-compose.demo-with-build.yml instead
#     to build images from your working tree.

name: cascadia-demo

services:
  postgres:
    image: postgres:18-alpine
    container_name: cascadia-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cascadia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - cascadia_demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cascadia']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [cascadia-demo]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cascadia-demo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cascadia
      RABBITMQ_DEFAULT_PASS: cascadia
    volumes:
      - cascadia_demo_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [cascadia-demo]

  # One-shot init container: copies the bundled demo dataset (~592 MB of
  # STEPs/GLBs/thumbnails) from the cascadia-demo-data image into a named
  # volume the app reads from. `cp -rn` is no-op on rerun, so restarts are
  # cheap. The app depends on this completing successfully before booting.
  demo-data-loader:
    image: ghcr.io/cascadia-plm/cascadia-demo-data:latest
    container_name: cascadia-demo-data-loader
    volumes:
      - cascadia_demo_app_data:/out
    command: sh -c "cp -rn /demo-data/. /out/ && echo 'demo data loaded'"
    networks: [cascadia-demo]

  app:
    image: ghcr.io/cascadia-plm/cascadia-app:latest
    container_name: cascadia-demo-app
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      demo-data-loader: { condition: service_completed_successfully }
    environment:
      NODE_ENV: production
      DATABASE_SSL: disable
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cascadia
      BETTER_AUTH_SECRET: cascadia-demo-secret-replace-for-real-deploys
      BETTER_AUTH_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
      FILE_STORAGE_PATH: /app/storage/files
      VAULT_TYPE: local
      VAULT_ROOT: /app/vault
      RABBITMQ_URL: amqp://cascadia:cascadia@rabbitmq:5672
      DEMO_DATA_DIR: /app/demo-data
    ports:
      - '${DEMO_APP_PORT:-3000}:3000'
    volumes:
      - cascadia_demo_app_storage:/app/storage
      - cascadia_demo_app_vault:/app/vault
      - cascadia_demo_app_data:/app/demo-data:ro
    # First-boot seed (drizzle push + minimal seed + demo seed with vault
    # ingest) takes 60-120s before the HTTP server starts. Override the
    # Dockerfile HEALTHCHECK's start_period accordingly.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 180s
    networks: [cascadia-demo]
    # First boot: push schema → minimal seed → demo seed → serve.
    # All steps are idempotent so reboots are safe.
    command: >
      sh -c "npx drizzle-kit push --force
      && npx tsx scripts/seed-minimal.ts
      && npx tsx scripts/seed-demo-robot-arm.ts
      && npm run serve"

  cad-converter:
    image: ghcr.io/cascadia-plm/cascadia-cad-converter:latest
    container_name: cascadia-demo-cad-converter
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cascadia
      RABBITMQ_URL: amqp://cascadia:cascadia@rabbitmq:5672
      VAULT_ROOT: /vault
      WORKER_CONCURRENCY: 2
      HEALTH_PORT: 3003
    volumes:
      # Share the app's vault volume so the converter can read user uploads
      # and write STL/GLB outputs back to the same store the app sees.
      - cascadia_demo_app_vault:/vault
    networks: [cascadia-demo]

  jobs-worker:
    image: ghcr.io/cascadia-plm/cascadia-jobs-worker:latest
    container_name: cascadia-demo-jobs-worker
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_SSL: disable
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cascadia
      RABBITMQ_URL: amqp://cascadia:cascadia@rabbitmq:5672
      WORKER_CONCURRENCY: 5
      JOB_TYPES: '*'
      JOB_TIMEOUT: 300000
    networks: [cascadia-demo]

volumes:
  cascadia_demo_postgres_data:
  cascadia_demo_rabbitmq_data:
  cascadia_demo_app_storage:
  cascadia_demo_app_vault:
  cascadia_demo_app_data:

networks:
  cascadia-demo:
    driver: bridge
